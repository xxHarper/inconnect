<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="../css/style.css?v=1" />
    <title>Oferta</title>
  </head>
  <body>
    <div class="sf-wtl">
      <form
        class="form-card"
        action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DHr00000FbZln"
        method="POST"
      >
        <input type="hidden" name="oid" value="00DHr00000FbZln" />
        <input
          type="hidden"
          name="retURL"
          value="https://inconnect.mx/gracias"
        />

        <div class="field">
          <label for="first_name">Nombre <span class="req">*</span></label>
          <input
            id="first_name"
            name="first_name"
            type="text"
            maxlength="40"
            required
            autocomplete="given-name"
          />
        </div>

        <div class="field">
          <label for="last_name">Apellidos <span class="req">*</span></label>
          <input
            id="last_name"
            name="last_name"
            type="text"
            maxlength="80"
            required
            autocomplete="family-name"
          />
        </div>

        <div class="field">
          <label for="mobile">Teléfono <span class="req">*</span></label>
          <div class="phone-wrap">
            <span class="prefix">MX +52</span>
            <input
              id="mobile"
              name="mobile"
              type="tel"
              minlength="10"
              maxlength="10"
              pattern="[0-9]{10}"
              inputmode="numeric"
              placeholder="10 dígitos"
              title="Ingresa exactamente 10 dígitos"
              required
              oninput="
                this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)
              "
            />
          </div>
        </div>

        <div class="field">
          <label for="email">Email <span class="req">*</span></label>
          <input
            id="email"
            name="email"
            type="email"
            maxlength="80"
            required
            autocomplete="email"
          />
        </div>

        <div class="field">
          <label for="00NHr00001cBZIx"
            >Giro Comercial <span class="req">*</span></label
          >
          <select
            id="00NHr00001cBZIx"
            name="00NHr00001cBZIx"
            title="Giro"
            required
          >
            <option value="" disabled selected>-Select-</option>
            <option value="Agencias de Viajes">Agencias de Viajes</option>
            <option value="Aseguradoras">Aseguradoras</option>
            <option value="Beneficencia">Beneficencia</option>
            <option value="Colegios y Universidades">
              Colegios y Universidades
            </option>
            <option value="Comida Rápida">Comida Rápida</option>
            <option value="Educación Basica">Educación Basica</option>
            <option value="Entretenimiento">Entretenimiento</option>
            <option value="Farmacias">Farmacias</option>
            <option value="Telecomunicaciones">Telecomunicaciones</option>
            <option value="Gasolineras">Gasolineras</option>
            <option value="Gobierno">Gobierno</option>
            <option value="Guarderías">Guarderías</option>
            <option value="Hospitales">Hospitales</option>
            <option value="Hoteles">Hoteles</option>
            <option value="Medicos y dentistas">Medicos y dentistas</option>
            <option value="Misceláneas">Misceláneas</option>
            <option value="Otros">Otros</option>
            <option value="Peaje">Peaje</option>
            <option value="Refacciones y Ferreterías">
              Refacciones y Ferreterías
            </option>
            <option value="Renta de Autos">Renta de Autos</option>
            <option value="Restaurantes">Restaurantes</option>
            <option value="Salones de belleza">Salones de belleza</option>
            <option value="Estacionamientos">Estacionamientos</option>
            <option value="supermercados">supermercados</option>
            <option value="Transporte Aereo">Transporte Aereo</option>
            <option value="Transporte Terrestre de Pasajeros">
              Transporte Terrestre de Pasajeros
            </option>
            <option value="Ventas al detalle (Retail)">
              Ventas al detalle (Retail)
            </option>
          </select>
        </div>

        <!-- Fase fijo -->
        <input
          type="hidden"
          id="00NHr00001SBgoa"
          name="00NHr00001SBgoa"
          value="En la cola"
        />

        <!-- Fuente de leads fijo -->
        <input
          type="hidden"
          id="00NHr00001cZCHa"
          name="00NHr00001cZCHa"
          value="Google"
        />

        <!-- Form name fijo -->
        <input
          type="hidden"
          id="00NHr00001cZCGN"
          name="00NHr00001cZCGN"
          value="Oferta"
        />

        <!-- Page Name = utm_source -->
        <input
          type="hidden"
          id="00NHr00001cZCGI"
          name="00NHr00001cZCGI"
          value=""
        />

        <!-- Campaign = utm_campaign -->
        <input
          type="hidden"
          id="00NHr00001cZCGX"
          name="00NHr00001cZCGX"
          value=""
        />

        <!-- Campaign ID = primer valor de utm_content -->
        <input
          type="hidden"
          id="00NHr00001cZCGw"
          name="00NHr00001cZCGw"
          value=""
        />

        <!-- AdSet ID = segundo valor de utm_content -->
        <input
          type="hidden"
          id="00NHr00001cZCGr"
          name="00NHr00001cZCGr"
          value=""
        />

        <!-- Keyword -->
        <input
          type="hidden"
          id="00NV400000I8Bf3"
          name="00NV400000I8Bf3"
          value=""
        />

        <!-- Device -->
        <input
          type="hidden"
          id="00NV400000I8Brx"
          name="00NV400000I8Brx"
          value=""
        />

        <!-- Matchtype -->
        <input
          type="hidden"
          id="00NV400000I8C01"
          name="00NV400000I8C01"
          value=""
        />

        <!-- Network -->
        <input
          type="hidden"
          id="00NV400000I8C4r"
          name="00NV400000I8C4r"
          value=""
        />

        <button type="submit" class="btn-submit" formtarget="_blank">
          Enviar
        </button>
      </form>
    </div>

    <script>
      (function () {
        const p = new URLSearchParams(window.location.search);

        const fromURL = {
          utm_source: p.get("utm_source"),
          utm_campaign: p.get("utm_campaign"),
          utm_content: p.get("utm_content"),
          utm_term: p.get("utm_term"),
          device: p.get("device"),
          matchtype: p.get("matchtype"),
          network: p.get("network"),
        };

        const hasTracking = Object.values(fromURL).some(Boolean);

        if (hasTracking) {
          sessionStorage.setItem("inconnect_tracking", JSON.stringify(fromURL));
        }

        let tracking = fromURL;

        const saved = sessionStorage.getItem("inconnect_tracking");

        if (!hasTracking && saved) {
          try {
            tracking = JSON.parse(saved);
          } catch (e) {
            tracking = fromURL;
          }
        }

        if (!Object.values(tracking).some(Boolean)) {
          tracking.utm_source = "Directo/Organico";
        }

        const rawContent = tracking.utm_content || "";

        const campaignId = rawContent.substring(0, 3);
        const adSetId = rawContent.substring(3, 6);
        const creativeId = rawContent.substring(6, 9);

        const setVal = (id, val) => {
          const el = document.getElementById(id);
          if (el) el.value = val || "";
        };

        // Page Name = utm_source
        setVal("00NHr00001cZCGI", tracking.utm_source);

        // Campaign = utm_campaign
        setVal("00NHr00001cZCGX", tracking.utm_campaign);

        // utm_content = campaignid*adgroupid*creative
        setVal("00NHr00001cZCGw", campaignId);
        setVal("00NHr00001cZCGr", adSetId);

        // Google Ads extra params
        setVal("00NV400000I8Bf3", tracking.utm_term);
        setVal("00NV400000I8Brx", tracking.device);
        setVal("00NV400000I8C01", tracking.matchtype);
        setVal("00NV400000I8C4r", tracking.network);
      })();
    </script>
  </body>
</html>
