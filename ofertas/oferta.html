<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-type" content="text/html; charset=UTF-8" />
  <link rel="stylesheet" href="../css/style.css?v=1" />
  <title>Buen fin</title>
</head>

<body>
  <div class="sf-wtl">
    <form class="form-card"
      action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DHr00000FbZln"
      method="POST">
      <input type="hidden" name="oid" value="00DHr00000FbZln" />
      <input type="hidden" name="retURL" value="https://inconnect.mx/gracias-medicos-1/" />

      <!-- Ocultos (no obligatorios) -->

      <!-- Tipo -->
      <input type="hidden" id="00NHr00001cZC5o" name="00NHr00001cZC5o" value="Nuevo" />

      <!-- Fase -->
      <input type="hidden" id="00NHr00001SBgoa" name="00NHr00001SBgoa" value="En la cola" />

      <!-- Campaign -->
      <input id="00NHr00001cZCGX" maxlength="244" name="00NHr00001cZCGX" size="20" type="hidden" />

      <!-- Page Name -->
      <input id="00NHr00001cZCGI" maxlength="244" name="00NHr00001cZCGI" size="20" type="hidden" />

      <!-- Form Name -->
      <input id="00NHr00001cZCGN" maxlength="244" name="00NHr00001cZCGN" size="20" type="hidden" />

      <!-- Fuente de leads -->
      <input id="00NHr00001cZCHa" name="00NHr00001cZCHa" title="Fuente de Leads" value="Google">
      />

      <div class="field">
        <label for="first_name">Nombre <span class="req">*</span></label>
        <input id="first_name" name="first_name" type="text" maxlength="40" required autocomplete="given-name" />
      </div>

      <div class="field">
        <label for="last_name">Apellidos <span class="req">*</span></label>
        <input id="last_name" name="last_name" type="text" maxlength="80" required autocomplete="family-name" />
      </div>

      <div class="field">
        <label for="mobile">Teléfono <span class="req">*</span></label>
        <div class="phone-wrap">
          <span class="prefix">MX +52</span>
          <input id="mobile" name="mobile" type="tel" minlength="10" maxlength="10" pattern="[0-9]{10}"
            inputmode="numeric" placeholder="10 dígitos" title="Ingresa exactamente 10 dígitos" required
            oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)" />
        </div>
      </div>

      <div class="field">
        <label for="email">Email <span class="req">*</span></label>
        <input id="email" name="email" type="email" maxlength="80" required autocomplete="email" />
      </div>

      <div class="field">
        <label for="00NHr00001cBZIx">Giro Comercial <span class="req">*</span></label>
        <select id="00NHr00001cBZIx" name="00NHr00001cBZIx" title="Giro" required>
          <option value="" disabled selected>-Select-</option>
          <option value="Agencias de Viajes">Agencias de Viajes</option>
          <option value="Aseguradoras">Aseguradoras</option>
          <option value="Beneficencia">Beneficencia</option>
          <option value="Colegios y Universidades">
            Colegios y Universidades
          </option>
          <option value="Comida Rápida">Comida Rápida</option>
          <option value="Educación Basica">Educación Basica</option>
          <option value="Entretenimiento">Entretenimiento</option>
          <option value="Farmacias">Farmacias</option>
          <option value="Telecomunicaciones">Telecomunicaciones</option>
          <option value="Gasolineras">Gasolineras</option>
          <option value="Gobierno">Gobierno</option>
          <option value="Guarderías">Guarderías</option>
          <option value="Hospitales">Hospitales</option>
          <option value="Hoteles">Hoteles</option>
          <option value="Medicos y dentistas">Medicos y dentistas</option>
          <option value="Misceláneas">Misceláneas</option>
          <option value="Otros">Otros</option>
          <option value="Peaje">Peaje</option>
          <option value="Refacciones y Ferreterías">
            Refacciones y Ferreterías
          </option>
          <option value="Renta de Autos">Renta de Autos</option>
          <option value="Restaurantes">Restaurantes</option>
          <option value="Salones de belleza">Salones de belleza</option>
          <option value="Estacionamientos">Estacionamientos</option>
          <option value="supermercados">supermercados</option>
          <option value="Transporte Aereo">Transporte Aereo</option>
          <option value="Transporte Terrestre de Pasajeros">
            Transporte Terrestre de Pasajeros
          </option>
          <option value="Ventas al detalle (Retail)">
            Ventas al detalle (Retail)
          </option>
        </select>
      </div>

      <button type="submit" class="btn-submit" formtarget="_blank">
        Enviar
      </button>
    </form>
  </div>

  <script>
    (function () {
      const p = new URLSearchParams(window.location.search);

      // Campaign -> tu campo custom de Campaign (00NHr00001cZCGX)
      const campaign = p.get("Campaign");
      if (campaign) {
        const elCamp = document.getElementById("00NHr00001cZCGX");
        if (elCamp) elCamp.value = campaign;
      }
    })();
  </script>

</body>

</html>
