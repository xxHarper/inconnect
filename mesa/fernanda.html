<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="../css/style.css?v=1" />
    <title>Home</title>
  </head>
  <body>
    <div class="sf-wtl">
      <form
        class="form-card"
        action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DHr00000FbZln"
        method="POST"
      >
        <input type="hidden" name="oid" value="00DHr00000FbZln" />
        <input
          type="hidden"
          name="retURL"
          value="https://inconnect.mx/gracias-medicos-1/"
        />

        <!-- Ocultos (no obligatorios) -->
        <!-- Fuente de leads -->
        <input
          type="hidden"
          id="00NHr00001cZCHa"
          name="00NHr00001cZCHa"
          value="Referido Zoho"
        />

        <!-- Campaña -->
        <input
          type="hidden"
          id="00NHr00001cZCGX"
          name="00NHr00001cZCGX"
          value="Zoho"
        />

        <!-- Page Name -->
       <!--  <input
          type="hidden"
          id="00NHr00001cZCGI"
          name="00NHr00001cZCGI"
          value="Página Home"
        /> -->

        <!-- Tipo -->
        <!-- <input
          type="hidden"
          id="00NHr00001cZC5o"
          name="00NHr00001cZC5o"
          value="Nuevo"
        /> -->

        <!-- Fase -->
        <input
          type="hidden"
          id="00NHr00001SBgoa"
          name="00NHr00001SBgoa"
          value="En la cola"
        />

        <!-- <div class="field">
          <label for="first_name">Nombre <span class="req">*</span></label>
          <input
            id="first_name"
            name="first_name"
            type="text"
            maxlength="40"
            required
            autocomplete="given-name"
          />
        </div> -->

        <div class="field">
          <label for="last_name">Apellidos <span class="req">*</span></label>
          <input
            id="last_name"
            name="last_name"
            type="text"
            maxlength="80"
            required
            autocomplete="family-name"
          />
        </div>

        <div class="field">
          <label for="mobile">Teléfono <span class="req">*</span></label>
          <div class="phone-wrap">
            <span class="prefix">MX +52</span>
            <input
              id="mobile"
              name="mobile"
              type="tel"
              minlength="10"
              maxlength="10"
              pattern="[0-9]{10}"
              inputmode="numeric"
              placeholder="10 dígitos"
              title="Ingresa exactamente 10 dígitos"
              required
              oninput="
                this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)
              "
            />
          </div>
        </div>

        <div class="field">
          <label for="email">Email <span class="req">*</span></label>
          <input
            id="email"
            name="email"
            type="email"
            maxlength="80"
            required
            autocomplete="email"
          />
        </div>

        <button type="submit" class="btn-submit" formtarget="_blank">
          Enviar
        </button>
      </form>
    </div>
  </body>
</html>
