<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="../css/style.css?v=1" />
    <title>Home</title>
  </head>

  <body>
    <div class="sf-wtl">
      <form
        class="form-card"
        action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DHr00000FbZln"
        method="POST"
      >
        <input type="hidden" name="oid" value="00DHr00000FbZln" />

        <input
          type="hidden"
          name="retURL"
          value="https://inconnect.mx/gracias-medicos-1/"
        />

        <!-- Ocultos -->
        <!-- Fuente de leads -->
        <input
          type="hidden"
          id="00NHr00001cZCHa"
          name="00NHr00001cZCHa"
          value="Referido Zoho"
        />

        <!-- Campaña -->
        <input
          type="hidden"
          id="00NHr00001cZCGX"
          name="00NHr00001cZCGX"
          value="Zoho"
        />

        <!-- Fase -->
        <input
          type="hidden"
          id="00NHr00001SBgoa"
          name="00NHr00001SBgoa"
          value="En la cola"
        />

        <!-- Email generado automáticamente -->
        <input
          type="hidden"
          id="email"
          name="email"
        />

        <div class="field">
          <label for="last_name">Apellidos <span class="req">*</span></label>
          <input
            id="last_name"
            name="last_name"
            type="text"
            maxlength="80"
            required
            autocomplete="family-name"
          />
        </div>

        <div class="field">
          <label for="mobile">Teléfono <span class="req">*</span></label>

          <div class="phone-wrap">
            <span class="prefix">MX +52</span>

            <input
              id="mobile"
              name="mobile"
              type="tel"
              minlength="10"
              maxlength="10"
              pattern="[0-9]{10}"
              inputmode="numeric"
              placeholder="10 dígitos"
              title="Ingresa exactamente 10 dígitos"
              required
              oninput="
                this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)
              "
            />
          </div>
        </div>

        <button type="submit" class="btn-submit" formtarget="_blank">
          Enviar
        </button>
      </form>
    </div>

    <script>
      function generarEmailUnico() {
        const timestamp = Date.now();

        const randomArray = new Uint32Array(2);
        crypto.getRandomValues(randomArray);

        const randomPart = Array.from(randomArray)
          .map(number => number.toString(36))
          .join("");

        return `lead_${timestamp}_${randomPart}@test-inconnect.mx`;
      }

      document.addEventListener("DOMContentLoaded", function () {
        const emailInput = document.getElementById("email");
        emailInput.value = generarEmailUnico();
      });
    </script>
  </body>
</html>
